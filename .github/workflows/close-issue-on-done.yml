name: Close issue when project card moves to Done

on:
  projects_v2_item:
    types: [edited]

jobs:
  close-issue:
    runs-on: [self-hosted, m5-TinyHeroes-Backend]
    steps:
      - name: Close linked issue when status becomes Done
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
          script: |
            const doneOptionId = '59250bf3';
            const item = context.payload.projects_v2_item;

            // Only act on status field changes
            const changes = context.payload.changes;
            if (!changes?.field_value?.field_name === 'Status') return;
            if (item.content_type !== 'Issue') return;

            // Check the new status via GraphQL (payload only has item ID, not the new value)
            const { node } = await github.graphql(`
              query($itemId: ID!) {
                node(id: $itemId) {
                  ... on ProjectV2Item {
                    fieldValueByName(name: "Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        optionId
                      }
                    }
                    content {
                      ... on Issue {
                        number
                        state
                        repository { nameWithOwner }
                      }
                    }
                  }
                }
              }
            `, { itemId: item.node_id });

            const optionId = node?.fieldValueByName?.optionId;
            if (optionId !== doneOptionId) {
              console.log(`Status is not Done (optionId=${optionId}) — skipping.`);
              return;
            }

            const issue = node?.content;
            if (!issue) {
              console.log('No linked issue content — skipping.');
              return;
            }

            if (issue.state === 'CLOSED') {
              console.log(`Issue #${issue.number} is already closed — skipping.`);
              return;
            }

            const [owner, repo] = issue.repository.nameWithOwner.split('/');
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

            console.log(`Closed issue #${issue.number} in ${issue.repository.nameWithOwner}.`);
