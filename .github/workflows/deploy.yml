name: Deploy to Azure

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write
  actions: read 

on:
  push:
    branches: [master]

jobs:
  check-runner:
    name: Determine Runner
    runs-on: ubuntu-latest
    outputs:
      runner-target: ${{ steps.determine-runner.outputs.labels }}
    steps:
      - name: Check local runner status
        id: determine-runner
        env:
          GH_TOKEN: ${{ secrets.PAT_RUNNER_CHECK }}
        run: |
          # Added "|| true" to prevent API rate limits or auth errors from crashing the job
          STATUS=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '.runners[] | select(.labels[].name == "m5-pro-local") | .status' 2>/dev/null | head -n 1 || true)

          if [ "$STATUS" = "online" ]; then
            echo "Local runner is online. Routing to m5-pro-local."
            echo 'labels=["self-hosted", "m5-pro-local"]' >> $GITHUB_OUTPUT
          else
            echo "Local runner is offline or check failed. Falling back to GitHub Cloud."
            echo 'labels=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          fi

  test-backend:
    name: Backend Tests
    needs: check-runner
    runs-on: ${{ fromJSON(needs.check-runner.outputs.runner-target) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore TinyHeroes.slnx

      - name: Build
        run: dotnet build TinyHeroes.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test TinyHeroes.slnx
          --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=lcov

      - name: Publish backend test results
        if: success() || failure()
        uses: dorny/test-reporter@v3
        with:
          name: Backend Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Upload backend coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: '**/TestResults/**/coverage.info'

  deploy-api:
    name: Backend → App Service
    needs: [check-runner, test-backend]
    runs-on: ${{ fromJSON(needs.check-runner.outputs.runner-target) }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract API version
        id: api_version
        run: |
          # Swapped grep -oP for sed to ensure macOS compatibility
          VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' TinyHeroes.Api/TinyHeroes.Api.csproj)
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        run: docker login "$ACR_SERVER" -u "$ACR_USER" -p "$ACR_PASS"
        env:
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE="${ACR_SERVER}/tinyheroes-api:latest"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --label "api-version=${API_VERSION}" \
            --tag "$IMAGE" \
            --push \
            --file TinyHeroes.Api/Dockerfile \
            .
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
        env:
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          API_VERSION: ${{ steps.api_version.outputs.value }}

      - name: Purge old untagged manifests
        env:
          ACR: ${{ secrets.ACR_LOGIN_SERVER }}
          USER: ${{ secrets.ACR_USERNAME }}
          PASS: ${{ secrets.ACR_PASSWORD }}
          REPO: tinyheroes-api
        run: |
          TOKEN=$(curl -sf "https://${ACR}/oauth2/token?service=${ACR}&scope=repository:${REPO}:*" \
            -u "${USER}:${PASS}" | jq -r '.access_token')
          DIGESTS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://${ACR}/acr/v1/${REPO}/_manifests" | \
            jq -r '.manifests[] | select(.tags == null or (.tags | length) == 0) | [.digest, .lastUpdateTime] | @tsv' | \
            sort -k2 -r)
          SKIP=true
          while IFS=$'\t' read -r digest _; do
            if $SKIP; then SKIP=false; echo "Keeping rollback: $digest"; continue; fi
            echo "Deleting old: $digest"
            curl -sf -X DELETE -H "Authorization: Bearer $TOKEN" \
              "https://${ACR}/v2/${REPO}/manifests/${digest}"
          done <<< "$DIGESTS"

      - name: Wait for healthy deployment
        run: |
          VERSION="${{ steps.api_version.outputs.value }}"
          URL="https://api.mytinyheroes.net/api/info"
          for i in $(seq 1 20); do
            DEPLOYED=$(curl -sf --max-time 5 "$URL" | jq -r '.version' 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$VERSION" ]; then
              echo "Version $VERSION is live"
              exit 0
            fi
            echo "Attempt $i/20: got '$DEPLOYED', expected '$VERSION'"
            sleep 10
          done
          echo "Timed out waiting for version $VERSION"
          exit 1

      - name: Verify health endpoints
        run: |
          BASE="https://api.mytinyheroes.net"
          for endpoint in /health /ready; do
            STATUS=$(curl -sf --max-time 5 -o /dev/null -w "%{http_code}" "$BASE$endpoint" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "$endpoint → $STATUS OK"
            else
              echo "$endpoint → $STATUS FAILED"
              exit 1
            fi
          done